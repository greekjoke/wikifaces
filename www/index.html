<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <meta http-equiv="Cache-Control" content="max-age=3600, must-revalidate" />
        <title>Wiki Faces</title>
        <script src="js/picojs/pico.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/cache.js"></script>
        <script src="js/wiki.js"></script>
        <script src="js/face.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/app.js"></script>
        <link rel="stylesheet" href="css/main.css">
        <link rel="icon" type="image/ico" href="media/favicon.ico" />
    </head>
    <style>
        #view {
            border: 2px solid blue;
            overflow: hidden;
            width: 10vw;
            aspect-ratio: 2 / 3;
            position: relative;
            background-color: gray;
        }
        #view.big {
            width: 15vw;
        }
        img#test {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: left top;
            transform: scale(1);
            transition-property: top, left, transform;
            transition-duration: 1.2s;
            transition-timing-function: ease-out;
        }
    </style>
    <body>

        <div>top</div>
        <canvas id="canvas" style="display: none;" width=320 height=240></canvas>
        <div id="view">
            <img src="" id="test" loading="lazy" />
        </div>
        <div>bottom</div>

    </body>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const allCols = await window.WfUtils.loadDataFile('data/collections.json')
            if (!allCols)
                return

            const view = document.querySelector('#view')
            const img = document.querySelector('#test')
            const facePad = 1.3
            const app = window.WfApp(allCols)
            await app.loadCollection('lit')

            // window.WfWiki.requestClaims('Sully_Prudhomme|Donald_Trump', function(title, claims) {
            //     console.log('requestClaims result', title, claims)
            // })

            const pers = window.WfWiki.Person('Orhan_Pamuk')
            if (pers) {
                await pers.load()
                const photo = pers.photo
                console.log('pers photo', photo)
                if (photo) {
                    img.crossOrigin = 'Anonymous'
                    img.src = photo.url
                }
            }

            return


            // const fileTitle = 'File:Portrait_frederic_mistral_(cropped).jpg'
            // const fileTitle = 'File:Professor_Jennifer_Doudna_ForMemRS_(cropped).jpg'
            // const fileTitle = 'File:Mumford2.jpg'
            const fileTitle = 'File:VladimirVoevodsky.jpg'
            // const fileTitle = 'File:Hugo_Duminil-Copin_in_Oberwolfach_(cropped).jpg'
            // const fileTitle = 'File:Maryna_Vazovska_MFO_2013_crop.jpg'
            // const fileTitle = 'File:Alain_Aspect_(26341660894)_(cropped).jpg'
            // const fileTitle = 'File:Michael_Jordan_in_2014.jpg'
            // const fileTitle = 'File:Kanye_West_at_the_2009_Tribeca_Film_Festival_(crop_2).jpg'

            const res = await WfWiki.requestFileInfo(fileTitle)
            if (res) {
                const updateImageScale = async function(img, pad) {
                    console.log('updateImageScale...')

                    let faceInfo = undefined
                    const atrX = img.getAttribute('data-det-x')
                    const atrY = img.getAttribute('data-det-y')
                    const atrDiam = img.getAttribute('data-det-diam')

                    if (atrX === null || atrX === undefined) {
                        const det = window.WfDetector(img)
                        faceInfo = await det.detect()
                        console.log('detection result', faceInfo)
                        img.setAttribute('data-det-x', faceInfo.x)
                        img.setAttribute('data-det-y', faceInfo.y)
                        img.setAttribute('data-det-diam', faceInfo.diam)
                    } else {
                        faceInfo = {
                            x: parseFloat(atrX),
                            y: parseFloat(atrY),
                            diam: parseFloat(atrDiam)
                        }
                        console.log('detection in attributes', faceInfo)
                    }

                    const iw = img.naturalWidth
                    const ih = img.naturalHeight
                    const view = img.closest('#view')
                    const vw = view.clientWidth
                    const vh = view.clientHeight
                    const viewScale = vw / iw

                    if (!faceInfo)
                        faceInfo = {x:0.5, y:0.5, diam:(1.0 / pad)}

                    const detScale = 1.0 / (faceInfo.diam * pad)
                    const scale = viewScale * detScale
                    let ox = Math.round(0.5 * vw - faceInfo.x * iw * scale)
                    let oy = Math.round(0.5 * vh - faceInfo.y * ih * scale)

                    // snap to view border
                    const iRight = Math.round(vw - iw * scale)
                    const iBottom = Math.round(vh - ih * scale)
                    ox = Math.min(0, ox) // snap to left border
                    oy = Math.min(0, oy) // snap to top border
                    ox = Math.max(iRight, ox) // snap to right border
                    oy = Math.max(iBottom, oy) // snap to bottom border

                    // update image style & etc
                    img.style.transform = `scale(${scale})`
                    img.style.left = `${ox}px`;
                    img.style.top = `${oy}px`;
                }

                img.onload = async function() {
                    console.log('image loaded')
                    updateImageScale(img, facePad)
                }

                img.onerror = function() {
                    console.log('image loading error')
                }

                img.crossOrigin = 'Anonymous'
                img.src = res.url
                // img.src = 'media/test1.jpg'

                img.onclick = function() {
                    view.classList.toggle('big')
                    // updateImageScale(img, facePad)
                }

                let resizeTimer = undefined
                const resizeObserver = new ResizeObserver(entries => {
                    for (const entry of entries) {
                        const { width, height } = entry.contentRect;
                        clearTimeout(resizeTimer)
                        resizeTimer = setTimeout(function() {
                            updateImageScale(img, facePad)
                        }, 800)
                    }
                });
                if (view) {
                    resizeObserver.observe(view);
                }
            }

        });
    </script>
</html>
