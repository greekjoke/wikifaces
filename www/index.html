<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <meta http-equiv="Cache-Control" content="max-age=3600, must-revalidate" />
        <title>Wiki Faces</title>
        <script src="js/picojs/pico.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/cache.js"></script>
        <script src="js/wiki.js"></script>
        <script src="js/face.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/app.js"></script>
        <script src="js/game.js"></script>
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/face.css">
        <link rel="stylesheet" href="css/explorer.css">
        <link rel="stylesheet" href="css/viewer.css">
        <link rel="stylesheet" href="css/game.css">
        <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
        <link rel="icon" type="image/ico" href="media/favicon.ico" />
    </head>

    <!-- face slot -->
    <script type="text/template" id="tpl-face-slot">
        <div class="face-slot">
            <img src="" loading="lazy" />
            <div class="details">some info about this photo</div>
            <div class="image-toolbar">
                <span class="button bn-orig" data-action=":photoOrig" title="Оригинальный размер">🔳</span>
                <span class="button bn-fit" data-action=":photoFit" title="Вписать в область просмотра">🔲</span>
                <span class="button bn-zoom-in" data-action=":photoZoomIn" title="Увеличить">🔎➕</span>
                <span class="button bn-zoom-out" data-action=":photoZoomOut" title="Уменьшить">🔎➖</span>
            </div>
        </div>
    </script>

    <!-- main menu -->
    <script type="text/template" id="tpl-layout-main">
        <div class="pa1 flex-center menu-list">
            <ul class="list-none w100">
                <li><button data-action="collections">Коллекции</button></li>
                <li><button data-action="playground">Играть</button></li>
                <li><button data-action="*settings">Настройки</button></li>
                <li><button data-action="https://github.com/greekjoke/wikifaces/#readme">Справка</button></li>
            </ul>
        </div>
        <div class="pa1 flex-center w25" id="disclaimer">
            <p>Все данные берутся с ресурсов <a target="_blank" href="https://en.wikipedia.org/">Википедии</a>, поэтому претензии к точности и достоверности информации переадресую авторам материалов указанной платформы.</p>
        </div>
    </script>

    <!-- settings menu -->
    <script type="text/template" id="tpl-layout-settings" data-title="Настройки">
        <div class="pa1">
            <label class="user-option w100 pav5f">
                <span class="w50">Подписи к фото</span>
                <input type="checkbox" class="button" data-action=":changeUserOption" data-name="face-details" />
            </label>
            <label class="user-option w100 pav5f">
                <span class="w50">Поиск лица</span>
                <select data-name="face-detecion" onchange="__wfApp.changeFaceDetection(this)">
                    <option value="off">Отключить</option>
                    <option value="eyes">Фокус на глаза</option>
                    <option value="face">Фокус на лицо</option>
                    <option value="distant">Общий план</option>
                </select>
            </label>
            <div style="margin-top: 1em;">
                <button data-action=":resetCache">⚠️&nbsp;Сброс настроек</button>
            </div>
        </div>
    </script>

    <!-- progress info -->
    <script type="text/template" id="tpl-layout-progress">
        <div class="flex-row">
            <div class="pa1 icon"><img src="media/search2.gif" /></div>
            <div class="pa1 progress-text">Загрузка данных может занять некоторое время. Пожалуйста, подождите...</div>
        </div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </script>

    <!-- image viewer menu -->
    <script type="text/template" id="tpl-layout-viewer" data-title="Просмотр">
        <div id="image-viewer" class="pa1">show image here...</div>
        <div class="image-editor-sidebar image-toolbar">
            <span class="button bn-edit" data-action=".edit" title="Редактировать">⚙️</span>
            <span class="button bn-orig" data-action=".orig" title="Оригинальный размер">🔳</span>
            <span class="button bn-fit" data-action=".fit" title="Вписать в область просмотра">🔲</span>
            <div class="separator">&nbsp;</div>
            <span class="button bn-zoom-in" data-action=".zoomIn" title="Увеличить">🔎➕</span>
            <span class="button bn-zoom-out" data-action=".zoomOut" title="Уменьшить">🔎➖</span>
            <div class="separator">&nbsp;</div>
            <span class="button bn-save" data-action=".save" title="Сохранить">✅</span>
            <span class="button bn-cancel" data-action=".cancel" title="Отмена">❌</span>
        </div>
    </script>

    <!-- collections menu -->
    <script type="text/template" id="tpl-layout-collections">
        <h2 class="pa25f">Все коллекции</h2>
        <div class="pot1 menu-list">
            <ul class="list-none collections-list"></ul>
        </div>
    </script>

    <!-- collection explorer menu -->
    <script type="text/template" id="tpl-layout-collection-explorer">
        <div class="pa1 toolbar w100 flex-center">
            <div class="w50 tar pah1">
                <i data-action=".orderAsc" class="button bn-order-asc fa-solid fa-arrow-up-short-wide" title="Сортировка по возрастанию"></i>
                <i data-action=".orderDesc" class="button bn-order-desc fa-solid fa-arrow-down-wide-short" title="Сортировка по убыванию"></i>
                <i data-action=".orderShuffle" class="button bn-order-shuffle fa-solid fa-shuffle" title="Перемешать"></i>
                &nbsp;
                &nbsp;
                <i data-action=".pageFirst" class="button bn-page-first fa-solid fa-backward-step" title="Первая страница"></i>
                <i data-action=".pagePrev" class="button bn-page-prev fa-solid fa-angle-left" title="Предыдущая страница"></i>
                <i data-action=".pageNext" class="button bn-page-next fa-solid fa-angle-right" title="Следующая страница"></i>
                <i data-action=".pageLast" class="button bn-page-last fa-solid fa-forward-step" title="Последняя страница"></i>
                &nbsp;
                &nbsp;
                <i data-action=".capLess" class="button bn-cap-less fa-solid fa-minus" title="Меньше картинок"></i>
                <i data-action=".capMore" class="button bn-cap-more fa-solid fa-plus" title="Больше картинок"></i>
            </div>
            <div class="w50 pah1">
                <span class="title">Title</span>
            </div>
        </div>
        <div class="pa1 faces-list"></div>
    </script>

    <!-- playground menu -->
    <script type="text/template" id="tpl-layout-playground">
        <h2 class="pa25f">Все игры</h2>
        <div class="pot1 menu-list">
            <ul class="list-none games-list"></ul>
        </div>
    </script>

    <!-- game launcher -->
    <script type="text/template" id="tpl-layout-game-launcher">
        <h2 class="pa25f game-title">Untitled</h2>
        <div class="slider">
            <div class="slide" data-name="intro">
                <div class="top-block">
                    <div class="logo"></div>
                    <div>
                        <div class="info">describe game rule here</div>
                        <div class="stat">some statistics</div>
                    </div>
                </div>
                <div class="flex-center sept pa1">
                    <div class="buttons w50 tac">
                        <button data-action=".start">Старт</button>
                    </div>
                </div>
            </div>
            <div class="slide card" data-name="card" data-button="" data-state="">
                <div class="content photo-prefer-height">card</div>
                <div class="buttons w100"></div>
            </div>
            <div class="slide" data-name="summary">
                <div class="top-pic"><img src="media/wbelt.png" /></div>
                <div class="results-block">
                    <div class="info">Раунд завершён</div>
                    <div class="stat">some statistics</div>
                </div>
                <div class="flex-center sept pa1">
                    <div class="buttons w50 tac">
                        <button data-action=".intro">К началу</button>
                    </div>
                </div>
                <div class="results-log">
                    <details>
                        <summary>Детали раунда</summary>
                        <div class="results-tab">cards & answers details...</div>
                    </details>
                </div>
            </div>
        </div>
    </script>

    <!-- other templates -->
    <script type="text/template" id="tpl-game-log-person">
        <div class="game-log-item flex-row">
            <div class="person-icon flex-center">
                <a href="" class="icon-link" target="_blank"><img src="" /></a>
            </div>
            <div class="person-info flex-column">
                <div class="person-name">
                    <span>Name</span><a href="#" target="_blank" class="icon-link">🔗</a>
                </div>
                <div class="person-bio"></div>
            </div>
            <div class="answer-info"></div>
        </div>
    </script>

    <!-- main page -->
    <body>
        <div id="top-sidebar">
            <!-- <span id="back" data-action=":navBack" class="button light" title="Назад">&LeftArrow;</span> -->
            <div id="main-wrapper">
                <div id="main-icon"><img src="media/logo1.png" /></div>
                <div id="main-title" class="button" data-action=":navBack">Wiki Faces</div>
            </div>
        </div>
        <div id="content"></div>
        <div id="modal-wrapper" style="display: none;">
            <div id="modal-box">
                <div id="modal-title">
                    <span>modal</span>
                    <span id="modal-close" class="button light" data-action=":close" title="Закрыть">&times;</span>
                </div>
                <div id="modal-content"></div>
            </div>
        </div>
        <canvas id="canvas" style="display: none;" width=320 height=240></canvas>
    </body>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const settings = await window.WfUtils.loadDataFile('data/settings.json')
            if (!settings)
                throw new Error('settings file loading failed')
            const app = window.WfApp(settings)
            app.start()
        });
    </script>
</html>
