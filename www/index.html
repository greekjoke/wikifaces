<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <meta http-equiv="Cache-Control" content="max-age=3600, must-revalidate" />
        <title>Wiki Faces</title>
        <script src="js/picojs/pico.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/cache.js"></script>
        <script src="js/wiki.js"></script>
        <script src="js/face.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/app.js"></script>
        <link rel="stylesheet" href="css/main.css">
        <link rel="icon" type="image/ico" href="media/favicon.ico" />
    </head>

    <!-- face slot -->
    <script type="text/template" id="tpl-face-slot">
        <div class="face-slot">
            <img src="" loading="lazy" />
            <div class="details">some info about photo</div>
        </div>
    </script>

    <!-- main menu -->
    <script type="text/template" id="tpl-layout-main">
        <div class="pa1 flex-center">
            <ul class="list-none">
                <li><button data-action="collections">Коллекции</button></li>
                <li><button data-action="playground">Играть</button></li>
                <li><button data-action="*settings">Настройки</button></li>
            </ul>
        </div>
        <div class="pa1 flex-center w25" id="disclaimer">
            <p>Все данные берутся с ресурсов <a target="_blank" href="https://www.wikidata.org/">Википедии</a>, поэтому претензии к точности и достоверности информации переадресую авторам материалов указанной платформы.</p>
        </div>
    </script>

    <!-- settings menu -->
    <script type="text/template" id="tpl-layout-settings" data-title="Настройки">
        <div class="pa1">
            <label class="user-option">
                <input type="checkbox" class="button" data-action=":changeUserOption" data-name="face-details" />
                <span>Показывать подписи к фото</span>
            </label>
            <div style="margin-top: 1em;">
                <button data-action=":resetCache">⚠️&nbsp;Сбор настроек</button>
            </div>
        </div>
    </script>

    <!-- progress info -->
    <script type="text/template" id="tpl-layout-progress">
        <div class="pa1 progress-text">Загрузка...</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </script>

    <!-- image viewer menu -->
    <script type="text/template" id="tpl-layout-viewer" data-title="Просмотр">
        <div id="image-viewer" class="pa1">show image here...</div>
        <div class="image-editor-sidebar">
            <span class="button bn-edit" data-action=".edit" title="Редактировать">⚙️</span>
            <span class="button bn-orig" data-action=".orig" title="Оригинальный размер">🔳</span>
            <span class="button bn-fit" data-action=".fit" title="Вписать в область просмотра">🔲</span>
            <div class="separator">&nbsp;</div>
            <span class="button bn-zoom-in" data-action=".zoomIn" title="Увеличить">🔎➕</span>
            <span class="button bn-zoom-out" data-action=".zoomOut" title="Уменьшить">🔎➖</span>
            <div class="separator">&nbsp;</div>
            <span class="button bn-save" data-action=".save" title="Сохранить">✅</span>
            <span class="button bn-cancel" data-action=".cancel" title="Отмена">❌</span>
        </div>
    </script>

    <!-- collections menu -->
    <script type="text/template" id="tpl-layout-collections">
        <div class="pa1">
            <ul class="list-none collections-list"></ul>
        </div>
    </script>

    <!-- collection explorer menu -->
    <script type="text/template" id="tpl-layout-collection-explorer">
        <div class="pa1 toolbar w100 flex-center">
            <div class="w50 tar pah1">
                <span class="button bn-order-asc" data-action=".orderAsc" title="Сортировка по возрастанию">🔼</span>
                <span class="button bn-order-desc" data-action=".orderDesc" title="Сортировка по убыванию">🔽</span>
                <span class="button bn-order-shuffle" data-action=".orderShuffle"title="Перемешать">🔀</span>
                &nbsp;
                &nbsp;
                <span class="button bn-page-first" data-action=".pageFirst" title="Первая страница">⏮️</span>
                <span class="button bn-page-prev" data-action=".pagePrev" title="Предыдущая страница">⬅️</span>
                <span class="button bn-page-next" data-action=".pageNext" title="Следующая страница">➡️</span>
                <span class="button bn-page-last" data-action=".pageLast" title="Последняя страница">⏭️</span>
                &nbsp;
                &nbsp;
                <span class="button bn-cap-less" data-action=".capLess" title="Меньше картинок">➖</span>
                <span class="button bn-cap-more" data-action=".capMore" title="Больше картинок">➕</span>
            </div>
            <div class="w50 pah1">
                <span class="title">Title</span>
            </div>
        </div>
        <div class="pa1 faces-list"></div>
    </script>

    <!-- playground menu -->
    <script type="text/template" id="tpl-layout-playground">
        <div class="pa1">
            TODO: playground
        </div>
    </script>

    <!-- main page -->
    <body>
        <div id="top-sidebar">
            <span id="back" data-action=":navBack" class="button light" title="Назад">&LeftArrow;</span>
            <div id="main-wrapper">
                <div id="main-icon">😀</div>
                <div id="main-title">Wiki Faces</div>
            </div>
        </div>
        <div id="content"></div>
        <div id="modal-wrapper" style="display: none;">
            <div id="modal-box">
                <div id="modal-title">
                    <span>modal</span>
                    <span id="modal-close" class="button light" data-action=":close" title="Закрыть">&times;</span>
                </div>
                <div id="modal-content"></div>
            </div>
        </div>
        <canvas id="canvas" style="display: none;" width=320 height=240></canvas>
    </body>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const cols = await window.WfUtils.loadDataFile('data/collections.json')
            if (!cols)
                return
            const app = window.WfApp(cols)
            app.selectLayout('main')
        });
    </script>
</html>
